# deejay-cog / evaluator.yaml
# Per-repo evaluation configuration — ecosystem-standards ADR-001, ADR-002

type: pipeline-cog

exemptions:
  - rule: TEST-011
    reason: "Evaluator false positive — check_mock_assertions regex only matches .assert_called* and misses .assert_not_called() (line 182 in test_ingest_to_api.py) and .call_count comparisons (line 149). Both are valid mock interrogation patterns. To remove this exemption, update check_mock_assertions in evaluator-cog to accept the full mock-assertion family."

  - rule: PIPE-006
    reason: "Evaluator false positive — check_prefect_run_logger searches for literal 'get_run_logger' inside flow bodies but deejay-cog calls get_prefect_logger(), a repo-local wrapper in _pipeline_eval.py that calls get_run_logger() with fallback (wrapper docstring: 'Satisfies PIPE-006'). The wrapper pattern is the intended implementation. To remove this exemption, update check_prefect_run_logger in evaluator-cog to accept calls to repo-local logger-wrapper functions."

  - rule: CD-015
    reason: "Evaluator false positive — check_prefect_serve_pattern looks for literal 'prefect.serve(' or 'flow.serve(' but main.py uses 'from prefect import serve' and then calls serve(...) directly (see main.py:25, main.py:48). Both import styles are valid. To remove this exemption, update check_prefect_serve_pattern in evaluator-cog to also accept bare serve(...) calls when prefect.serve is imported."

  - rule: CD-010
    reason: "on-demand cog with no expected cadence — flows run only when Kaiano triggers DJ event processing (roughly monthly). Healthchecks.io's liveness model assumes a regular cadence and doesn't apply here. Per-flow success/failure is observable via Prefect run state."

  - rule: PIPE-005
    reason: >
      The flagged call (g.drive.delete_file in
      src/deejay_cog/process_new_files.py inside
      remove_summary_file_for_year) deletes a *derivative summary
      sheet*, not an upstream input. The summary sheet is created by
      this same cog in generate_summaries.py (via
      g.drive.create_spreadsheet_in_folder) and is regenerated from
      scratch on every generate-summaries run. The deletion runs
      immediately before regeneration to prevent stale duplicates
      from accumulating in the Summary folder. PIPE-005's intent is
      to protect raw inputs (CSVs, transcripts) from accidental
      deletion; that intent does not apply here. The deterministic
      checker's pattern match on delete_file(...) is too broad to
      distinguish derivative artifacts from upstream inputs —
      tracked as a future tightening of the PIPE-005 detector.