name: Process New CSV Files
run-name: Process New CSV Files (${{ github.event_name }})

on:
  workflow_dispatch:
  repository_dispatch:
    types: [new_csv_dj_sets]

concurrency:
  group: dj-set-collection
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest
    env:
      LOGGING_LEVEL: ${{ vars.LOGGING_LEVEL }}
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      KAIANO_API_BASE_URL: ${{ vars.KAIANO_API_BASE_URL }}
      KAIANO_API_OWNER_ID: ${{ vars.KAIANO_API_OWNER_ID }}
      OWNER_ID: ${{ vars.OWNER_ID }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      STANDARDS_VERSION: "6.0"
      PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
      PREFECT_API_URL: ${{ vars.PREFECT_API_URL }}
      SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
      SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
      SPOTIPY_REFRESH_TOKEN: ${{ secrets.SPOTIPY_REFRESH_TOKEN }}
      SPOTIPY_REDIRECT_URI: ${{ vars.SPOTIPY_REDIRECT_URI }}
      SPOTIFY_RADIO_PLAYLIST_ID: ${{ vars.SPOTIFY_RADIO_PLAYLIST_ID }}
      SPOTIFY_PLAYLIST_SNAPSHOT_JSON_PATH: ${{ vars.SPOTIFY_PLAYLIST_SNAPSHOT_JSON_PATH }}
      KAIANO_API_REPO_TOKEN: ${{ secrets.KAIANO_API_REPO_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Authenticate with Prefect Cloud
        env:
          PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
          PREFECT_API_URL: ${{ vars.PREFECT_API_URL }}
        run: |
          uv run prefect cloud login \
            --key $PREFECT_API_KEY \
            --workspace ${{ vars.PREFECT_ACCOUNT_SLUG }}/${{ vars.PREFECT_WORKSPACE_SLUG }}

      - name: Run process_new_csv_files flow
        run: uv run python -u src/deejay_set_processor/process_new_files.py

      - name: Checkout kaiano-api repo
        uses: actions/checkout@v4
        with:
          repository: kaianolevine/kaiano-api
          path: kaiano-api
          token: ${{ secrets.KAIANO_API_REPO_TOKEN }}

      - name: Copy Spotify playlist snapshot JSON into kaiano-api
        run: |
          DEST="kaiano-api/src/json-site-data/spotify"
          mkdir -p "$DEST"
          SNAPSHOT_PATH="${SPOTIFY_PLAYLIST_SNAPSHOT_JSON_PATH:-v1/spotify/spotify_playlists.json}"
          if [ -f "$SNAPSHOT_PATH" ]; then
            cp -f "$SNAPSHOT_PATH" "$DEST/spotify_playlists.json"
          else
            echo "Snapshot file not found at $SNAPSHOT_PATH — skipping copy."
          fi

      - name: Commit and push kaiano-api (if changed)
        run: |
          cd kaiano-api
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/json-site-data/spotify/spotify_playlists.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update Spotify playlists snapshot JSON"
          git push
