name: Manual Version Bump

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Type of release to perform'
        required: true
        default: 'minor'
        type: choice
        options:
          - minor
          - major

permissions:
  contents: write

jobs:
  manual-version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.11
      - name: Install Dependencies and Run Tests
        run: |
          uv sync --all-extras
          uv run pytest
      - name: Auto Increment Version
        env:
          RELEASE_TYPE: ${{ github.event.inputs.release_type }}
        run: |
          CURRENT_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "Current version: $CURRENT_VERSION"
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          echo "Release type selected: $RELEASE_TYPE"
          if [ "$RELEASE_TYPE" = "major" ]; then
            NEW_MAJOR=$((major+1))
            NEW_VERSION="$NEW_MAJOR.0.0"
          else
            NEW_MINOR=$((minor+1))
            NEW_VERSION="$major.$NEW_MINOR.0"
          fi
          echo "New version: $NEW_VERSION"
          uv run python -c "
          import re
          p = open('pyproject.toml').read()
          p = re.sub(r'^version = \".*\"', 'version = \"' + '$NEW_VERSION' + '\"', p, flags=re.MULTILINE)
          open('pyproject.toml', 'w').write(p)
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "🔖 Bump version to $NEW_VERSION"
          git tag -a "v$NEW_VERSION" -m "Release $NEW_VERSION"
          git push --follow-tags
