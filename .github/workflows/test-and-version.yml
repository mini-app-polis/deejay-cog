name: Test, Coverage, and Auto Version Bump

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.11
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Run pre-commit checks
        run: uv run pre-commit run --all-files
      - name: Run tests with coverage (no fail-under)
        run: |
          uv run pytest --cov=src --cov-report=term-missing --cov-fail-under=0
      - name: Check coverage threshold (warn except main)
        run: |
          THRESHOLD=60
          echo "📊 Checking coverage threshold..."
          TOTAL_LINE=$(uv run coverage report | tail -n 1)
          echo "Coverage summary line: $TOTAL_LINE"
          COVERAGE=$(echo "$TOTAL_LINE" | awk '{print $NF}' | tr -d '%')
          echo "Detected total coverage: ${COVERAGE:-unknown}%"
          if [ -z "$COVERAGE" ]; then
            echo "⚠️ Could not determine coverage percentage. Skipping check."
            exit 0
          fi

          if [ "$COVERAGE" -lt "$THRESHOLD" ]; then
            echo "⚠️ Coverage ($COVERAGE%) is below the threshold ($THRESHOLD%)."
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              echo "❌ Failing build on main branch due to coverage threshold."
            else
              echo "✅ Continuing despite low coverage (non-main branch)."
            fi
          else
            echo "✅ Coverage ($COVERAGE%) meets threshold ($THRESHOLD%)."
          fi

  bump:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.11
      - name: Auto Increment Patch
        run: |
          CURRENT_VERSION=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
          NEW_VERSION="$major.$minor.$((patch+1))"
          uv run python -c "
          import re
          p = open('pyproject.toml').read()
          p = re.sub(r'^version = \".*\"', 'version = \"' + '$NEW_VERSION' + '\"', p, flags=re.MULTILINE)
          open('pyproject.toml', 'w').write(p)
          "
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "🔖 Bump version to $NEW_VERSION"
          git tag -a "v$NEW_VERSION" -m "Release $NEW_VERSION"
          git push --follow-tags
